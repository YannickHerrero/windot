# See https://github.com/YannickHerrero/wbar/blob/master/examples/config.toml
# for the full annotated reference.

[bar]
position = "top"
height = 28

[font]
family = "JetBrainsMono Nerd Font"
size = 12.0

# Paper | Stone | Sage | Clay | Ink
theme = "Stone"

[layout]
left   = ["tiling", "gap", "workspaces"]
center = ["clock"]
right  = ["battery", "cpu", "memory"]

# Extra breathing room between the tiling-direction pill and the
# workspaces row. The global REGION_ITEM_SPACING (4px) feels too tight
# between these two semantically distinct surfaces.
[widgets.gap]
type = "spacer"
width = 8

[widgets.workspaces]
type = "glazewm"
show_empty = false

# Current GlazeWM tiling direction (horizontal/vertical split). Native
# widget — wbar subscribes to GlazeWM's tiling_direction_changed event
# stream so updates land within one repaint of Alt+R (toggle-tiling-direction).
[widgets.tiling]
type = "tiling-direction"
# Defaults are '-' / '|'; uncomment to override.
# horizontal = "─"
# vertical   = "│"

[widgets.clock]
type = "clock"
format = "%a %-d %b %-I:%M %p"
tick_seconds = 1

[widgets.memory]
type = "sysinfo"
metric = "ram"
icon = ""
format = "{value:>3.0}%"
interval_seconds = 2

[widgets.cpu]
type = "sysinfo"
metric = "cpu"
icon = ""
format = "{value:>3.0}%"
interval_seconds = 2
warn_above = 85.0

[widgets.battery]
type = "sysinfo"
metric = "battery"
icon = ""
charging_icon = "󰂄"
format = "{value:>3.0}%"
interval_seconds = 10
