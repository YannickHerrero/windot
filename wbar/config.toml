# See https://github.com/YannickHerrero/wbar/blob/master/examples/config.toml
# for the full annotated reference.

[bar]
position = "top"
height = 28

[font]
family = "JetBrainsMono Nerd Font"
size = 12.0

# Paper | Stone | Sage | Clay | Ink
theme = "Stone"

[layout]
left   = ["workspaces", "tiling"]
center = ["clock"]
right  = ["battery", "cpu", "memory"]

[widgets.workspaces]
type = "glazewm"
show_empty = false

# Current GlazeWM tiling direction (horizontal/vertical split). Polled via
# a tiny PowerShell wrapper that shells out to `GlazeWM query
# tiling-direction`. 1-second cadence keeps the latency tolerable after
# Alt+R (toggle-tiling-direction) without burning CPU.
[widgets.tiling]
type = "command"
command = "powershell -NoProfile -ExecutionPolicy Bypass -File %APPDATA%\\wbar\\tiling-direction.ps1"
interval_seconds = 1

[widgets.clock]
type = "clock"
format = "%a %-d %b %-I:%M %p"
tick_seconds = 1

[widgets.memory]
type = "sysinfo"
metric = "ram"
icon = ""
format = "{value:>3.0}%"
interval_seconds = 2

[widgets.cpu]
type = "sysinfo"
metric = "cpu"
icon = ""
format = "{value:>3.0}%"
interval_seconds = 2
warn_above = 85.0

[widgets.battery]
type = "sysinfo"
metric = "battery"
icon = ""
charging_icon = "󰂄"
format = "{value:>3.0}%"
interval_seconds = 10
