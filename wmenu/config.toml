theme = "Stone"
amphetamine_enabled = false
settings_borderless = false
# Minutes between desktop-wallpaper re-randomizations within the active
# theme's pool. 0 disables rotation (wallpaper still changes on theme switch).
wallpaper_rotation_minutes = 30

[daemon]
autostart = true
start_minimized = true

[launcher]
hotkey = "Alt+Space"
omakase_hotkey = "Alt+Super+Space"
scan_interval_minutes = 5
extra_dirs = []

[[bindings]]
label = "New terminal"
key = "Alt+Enter"
action = { type = "focus_or_launch", exe_path = "wezterm-gui.exe" }

[[bindings]]
label = "File explorer"
key = "Alt+e"
action = { type = "focus_or_launch", exe_path = "Explorer.exe" }
